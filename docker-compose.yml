version: "2.4"

services:
  typesense:
    image: typesense/typesense:29.0
    container_name: typesense-legal
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    mem_limit: 4g
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY}
      --enable-cors

volumes:
  typesense-data:
